<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Регистрация – {{ gosb.name }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f0f4fa 0%, #e2eaf2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            max-width: 560px;
            width: 100%;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.15);
            overflow: hidden;
        }
        .card-header {
            background: #1a73e8;
            padding: 28px 24px 20px;
            text-align: center;
            color: white;
        }
        .card-header h1 { font-size: 1.9rem; margin-bottom: 6px; }
        .card-body { padding: 28px 26px 32px; }
        .form-group { margin-bottom: 24px; }
        label { display: block; font-weight: 500; margin-bottom: 8px; color: #202124; }
        input, select {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid #dadce0;
            border-radius: 20px;
            font-size: 1rem;
            font-family: inherit;
        }
        .btn {
            width: 100%;
            background: #1a73e8;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn:disabled { background: #bdc1c6; cursor: not-allowed; }
        .status {
            margin-top: 24px;
            padding: 16px;
            border-radius: 24px;
            display: none;
            text-align: center;
        }
        .status.success { background: #e6f4ea; color: #137333; }
        .status.error { background: #fce8e6; color: #c5221f; }
    </style>
</head>
<body>
<div class="card">
    <div class="card-header">
        <h1>📚 Регистрация на обучение</h1>
        <p>{{ gosb.name }}</p>
    </div>
    <div class="card-body">
        <form id="regForm">
            <div class="form-group">
                <label for="fio">ФИО полностью *</label>
                <input type="text" id="fio" required>
            </div>
            <div class="form-group">
                <label for="city">КИЦ (город) *</label>
                <select id="city" required>
                    <option value="">Выберите город</option>
                    {% for city in cities %}
                    <option value="{{ city.id }}">{{ city.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="purpose">Цель визита *</label>
                <select id="purpose" required>
                    <option value="Модуль 1">Модуль 1</option>
                    <option value="Модуль 2">Модуль 2</option>
                    <option value="ЕПП">Ежегодная периодическая проверка (ЕПП)</option>
                    <option value="Контраварийная подготовка">Контраварийная подготовка</option>
                </select>
            </div>
            <button type="submit" id="submitBtn" class="btn">Зарегистрироваться</button>
        </form>
        <div id="status" class="status"></div>
    </div>
</div>

<script>
    let locationData = { lat: null, lng: null };
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
            locationData.lat = pos.coords.latitude;
            locationData.lng = pos.coords.longitude;
        });
    }

    document.getElementById('regForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const fio = document.getElementById('fio').value.trim();
        const cityId = document.getElementById('city').value;
        const purpose = document.getElementById('purpose').value;

        if (!fio || !cityId || !purpose) {
            showStatus('Заполните все поля', 'error');
            return;
        }

        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.textContent = 'Отправка...';

        const payload = {
            fio: fio,
            city_id: parseInt(cityId),
            purpose: purpose,
            latitude: locationData.lat,
            longitude: locationData.lng,
            gosb_slug: '{{ gosb.slug }}'
        };

        try {
            const resp = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const result = await resp.json();
            if (result.status === 'success') {
                showStatus(`✅ Регистрация успешна!<br>${result.address}`, 'success');
                document.getElementById('regForm').reset();
            } else {
                showStatus(`❌ Ошибка: ${result.message}`, 'error');
            }
        } catch (err) {
            showStatus('Ошибка соединения', 'error');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Зарегистрироваться';
        }
    });

    function showStatus(msg, type) {
        const div = document.getElementById('status');
        div.innerHTML = msg;
        div.className = `status ${type}`;
        div.style.display = 'block';
        setTimeout(() => div.style.display = 'none', 5000);
    }
</script>
</body>
</html>
