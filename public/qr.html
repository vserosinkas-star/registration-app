<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR-коды для всех ГОСБ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            font-size: 32px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        .qr-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }
        .qr-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        .qr-card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 20px;
        }
        .qr-card .qr-image {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            display: inline-block;
            margin-bottom: 15px;
        }
        .qr-card img {
            width: 200px;
            height: 200px;
        }
        .qr-card .url {
            color: #666;
            font-size: 12px;
            word-break: break-all;
            margin-top: 10px;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 8px;
        }
        .qr-card .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
        }
        .qr-card .btn {
            display: inline-block;
            padding: 8px 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .qr-card .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .qr-card .btn-outline {
            background: transparent;
            border: 1px solid #667eea;
            color: #667eea;
        }
        .footer {
            text-align: center;
            color: white;
            margin-top: 40px;
            font-size: 14px;
        }
        @media print {
            body { background: white; }
            h1 { color: #333; }
            .qr-card { break-inside: avoid; }
            .btn { display: none; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📱 QR-коды для регистрации в учебном центре</h1>
    <div class="qr-grid" id="qrGrid"></div>
    <div class="footer">
        © 2026 QR-ОбучAI · Все QR-коды для регистрации в учебном центре<br>
        Нажмите Ctrl+P для печати всех QR-кодов
    </div>
</div>

<script>
    // Список ГОСБ (slug и название)
    const gosbList = [
        { slug: 'apparat', name: 'Аппарат Банка' },
        { slug: 'bashkir', name: 'Башкирский ГОСБ' },
        { slug: 'chelyabinsk', name: 'Челябинский ГОСБ' },
        { slug: 'ugra', name: 'Югорский ГОСБ' },
        { slug: 'yanao', name: 'ЯНАО' },
        { slug: 'tyumen', name: 'Тюменский ГОСБ' },
        { slug: 'kurgan', name: 'Курганский ГОСБ' }
    ];

    // Базовый URL вашего приложения (автоматически подставляется текущий домен)
    const baseUrl = window.location.origin;

    const grid = document.getElementById('qrGrid');

    gosbList.forEach(gosb => {
        const url = `${baseUrl}/register/${gosb.slug}`;
        const qrSrc = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(url)}`;
        const downloadUrl = `https://api.qrserver.com/v1/create-qr-code/?size=500x500&data=${encodeURIComponent(url)}`;

        const card = document.createElement('div');
        card.className = 'qr-card';
        card.innerHTML = `
            <h2>${gosb.name}</h2>
            <div class="qr-image">
                <img src="${qrSrc}" alt="QR ${gosb.name}">
            </div>
            <div class="url">${url}</div>
            <div class="button-group">
                <a href="${url}" target="_blank" class="btn">🔗 Перейти к форме</a>
                <a href="${downloadUrl}" target="_blank" class="btn btn-outline">📥 Скачать QR</a>
            </div>
        `;
        grid.appendChild(card);
    });
</script>
</body>
</html>
