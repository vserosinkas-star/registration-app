<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>AI Сводная панель обучения (сетка)</title>

    <!-- DataTables -->
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.13.4/css/jquery.dataTables.min.css">
    <!-- flatpickr -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/ru.js"></script>

    <style>
        /* ... (все стили остаются как в предыдущей версии, добавить новые) ... */
        .purpose-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .btn-purpose {
            padding: 0.4rem 1rem;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            background: transparent;
            color: #e0e0e0;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-purpose.active {
            background: #6c5ce7;
            border-color: #6c5ce7;
            color: white;
        }
        .btn-purpose:hover {
            border-color: #6c5ce7;
            background: rgba(108,92,231,0.2);
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🧠 Сводная панель обучения (AI Edition)</h1>

    <div class="filters-card">
        <div class="filters-grid">
            <!-- ... существующие фильтры ... -->
            <!-- Добавляем блок кнопок -->
            <div class="filter-item" style="flex: 1 1 100%; margin-top: 0.5rem;">
                <label>Фильтр по цели</label>
                <div class="purpose-buttons">
                    <button class="btn-purpose active" data-purpose="">Все</button>
                    <button class="btn-purpose" data-purpose="Модуль 1">Модуль 1</button>
                    <button class="btn-purpose" data-purpose="Модуль 2">Модуль 2</button>
                    <button class="btn-purpose" data-purpose="ЕПП">ЕПП</button>
                    <button class="btn-purpose" data-purpose="Контраварийная подготовка">Контраварийная</button>
                </div>
            </div>
            <div class="filter-buttons">
                <button class="btn" id="applyFilters">🔍 Применить</button>
                <button class="btn btn-outline" id="resetFilters">↺ Сбросить</button>
                <button class="btn btn-outline" id="refreshBtn">🔄 Обновить из базы</button>
                <button class="btn btn-outline" id="sendTelegramBtn">📨 Отправить сегодняшних в Telegram</button>
                <button class="btn btn-outline" id="exportExcelBtn">📊 Выгрузить в Excel</button>
                <button class="btn btn-outline" id="remindKicBtn">📧 Напомнить руководителям КИЦ</button>
            </div>
        </div>
    </div>

    <!-- Блок статистики -->
    <div id="statisticsCard" class="filters-card" style="display: none; margin-bottom: 1rem; padding: 1rem;">
        <div style="font-size: 1.2rem; font-weight: 600;">
            📊 Статистика: <span id="statText">Зарегистрировано X из Y сотрудников (Z%)</span>
        </div>
    </div>

    <div class="table-card">
        <table id="dataTable" class="display" style="width:100%">
            <thead>
                <tr>
                    <th>Дата и время</th><th>Табельный №</th><th>Ф.И.О.</th><th>Подразделение</th>
                    <th>Огневая ОЭТ</th><th>Блочное обучение</th><th>Радиосвязь</th>
                    <th>Учения</th><th>Контраварийная</th><th>Модуль 1</th><th>ЕПП</th>
                </tr>
            </thead>
            <tbody></tbody>
            <tfoot>
                <tr>
                    <th><input type="text" placeholder="Дата/время"></th><th><input type="text" placeholder="Таб.№"></th>
                    <th><input type="text" placeholder="Ф.И.О."></th><th><input type="text" placeholder="Подразделение"></th>
                    <th><input type="text" placeholder="Огневая"></th><th><input type="text" placeholder="Блочное"></th>
                    <th><input type="text" placeholder="Радиосвязь"></th><th><input type="text" placeholder="Учения"></th>
                    <th><input type="text" placeholder="Контравар."></th><th><input type="text" placeholder="Модуль 1"></th>
                    <th><input type="text" placeholder="ЕПП"></th>
                </tr>
            </tfoot>
        </table>
    </div>
</div>

<script>
    let table;
    let datePicker;
    let allGosb = [];
    let currentPurpose = '';

    // ... (все существующие функции: loadGosbList, loadCities, initDatePicker, formatDateForApi, loadStatistics, loadTableData, resetFilters и т.д.)

    // Изменённая функция loadTableData с учётом currentPurpose
    async function loadTableData() {
        const gosb = document.getElementById('gosbSelect').value;
        const city = document.getElementById('kicSelect').value;
        const fio = document.getElementById('fioFilter').value;
        const year = document.getElementById('yearFilter').value;
        const quarter = document.getElementById('quarterFilter').value;
        const month = document.getElementById('monthFilter').value;
        const exactDate = formatDateForApi(document.getElementById('datePicker').value);

        let url = '/api/report-data?';
        const params = new URLSearchParams();
        if (gosb) params.append('gosb', gosb);
        if (city) params.append('city', city);
        if (fio) params.append('fio', fio);
        if (year) params.append('year', year);
        if (quarter) params.append('quarter', quarter);
        if (month) params.append('month', month);
        if (exactDate) params.append('exact_date', exactDate);
        if (currentPurpose) params.append('purpose', currentPurpose);
        url += params.toString();

        const resp = await fetch(url);
        const data = await resp.json();

        const tableData = data.map(row => [
            row.timestamp,
            row.tab_number || '',
            row.fio,
            row.subdivision || '',
            row.fire_training || '',
            row.block_training || '',
            row.radio_comm || '',
            row.drills || '',
            row.emergency || '',
            row.module1 || '',
            row.epp || ''
        ]);

        if (table) {
            table.clear();
            table.rows.add(tableData);
            table.draw();
        } else {
            // инициализация DataTable
            table = $('#dataTable').DataTable({
                data: tableData,
                columns: [ /* ... */ ],
                order: [[0, 'desc']],
                language: { /* ... */ },
                initComplete: function () {
                    this.api().columns().every(function () {
                        let column = this;
                        let input = $(column.footer()).find('input');
                        input.on('keyup change', function () {
                            column.search(this.value).draw();
                        });
                    });
                }
            });
            $('.dataTables_filter').hide();
            const lengthDiv = $('.dataTables_length');
            if (lengthDiv.length && $('#recordsCounter').length === 0) {
                lengthDiv.after('<span id="recordsCounter" class="records-counter">Всего: <span class="total-count">0</span> чел.</span>');
            }
        }

        const filteredCount = table.rows({ search: 'applied' }).count();
        $('#recordsCounter .total-count').text(filteredCount);
    }

    // Обработчики кнопок цели
    document.querySelectorAll('.btn-purpose').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.btn-purpose').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentPurpose = btn.getAttribute('data-purpose');
            loadTableData();
            loadStatistics();
        });
    });

    // Остальные обработчики и функции без изменений...
    // Не забудьте скопировать все остальные функции (loadGosbList, loadStatistics, resetFilters и т.д.)
    // из предыдущей версии dashboard.html

    window.onload = async () => {
        initDatePicker();
        await loadGosbList();
        await loadTableData();
        await loadStatistics();
        document.getElementById('applyFilters').addEventListener('click', () => {
            loadTableData();
            loadStatistics();
        });
        document.getElementById('resetFilters').addEventListener('click', () => {
            resetFilters();
        });
        // Кнопка "Обновить из базы" уже есть
    };
</script>
</body>
</html>
