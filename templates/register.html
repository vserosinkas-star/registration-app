<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Регистрация – {{ gosb.name }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: linear-gradient(135deg, #f0f4fa 0%, #e2eaf2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            max-width: 560px;
            width: 100%;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.15);
            overflow: hidden;
        }
        .card-header {
            background: #1a73e8;
            padding: 28px 24px 20px;
            text-align: center;
            color: white;
        }
        .card-header h1 { font-size: 1.9rem; margin-bottom: 6px; }
        .card-body { padding: 28px 26px 32px; }
        .form-group { margin-bottom: 24px; position: relative; }
        label {
            display: block;
            font-weight: 500;
            color: #202124;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }
        input, select {
            width: 100%;
            padding: 14px 18px;
            font-size: 1rem;
            border: 1px solid #dadce0;
            border-radius: 20px;
            background: #fefefe;
            transition: all 0.2s;
            font-family: inherit;
        }
        input:focus, select:focus {
            border-color: #1a73e8;
            outline: none;
            box-shadow: 0 0 0 3px rgba(26,115,232,0.2);
            background: #ffffff;
        }
        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='%235f6368'%3E%3Cpath d='M7 10l5 5 5-5z'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 16px center;
            background-size: 20px;
        }
        .hint {
            font-size: 0.75rem;
            color: #5f6368;
            margin-top: 6px;
            margin-left: 8px;
        }
        .btn {
            width: 100%;
            background: #1a73e8;
            color: white;
            border: none;
            padding: 16px 20px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 12px;
        }
        .btn:not(:disabled):hover {
            background: #1765d1;
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(26,115,232,0.25);
        }
        .btn:disabled {
            background: #bdc1c6;
            cursor: not-allowed;
        }
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .status {
            margin-top: 24px;
            padding: 16px 18px;
            border-radius: 24px;
            font-size: 0.9rem;
            text-align: center;
            display: none;
        }
        .status.success { background: #e6f4ea; color: #137333; border: 1px solid #b7e0c0; }
        .status.error { background: #fce8e6; color: #c5221f; border: 1px solid #f5c2c0; }
        .status.warning { background: #fff3e0; color: #b45f06; border: 1px solid #ffe6b3; }
        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.7rem;
            color: #80868b;
            padding: 0 12px 18px;
        }
        /* Стили для подсказок поиска сотрудника */
        #employeeSuggestions {
            background: white;
            border: 1px solid #ccc;
            border-radius: 12px;
            margin-top: 4px;
            max-height: 200px;
            overflow-y: auto;
            position: absolute;
            width: calc(100% - 36px);
            z-index: 1000;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        #employeeSuggestions div {
            padding: 10px 12px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
        }
        #employeeSuggestions div:last-child { border-bottom: none; }
        #employeeSuggestions div:hover {
            background: #e8f0fe;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="card-header">
        <h1>📚 Регистрация на обучение</h1>
        <p>{{ gosb.name }}</p>
    </div>
    <div class="card-body">
        <form id="regForm">
            <!-- Поле поиска сотрудника -->
            <div class="form-group">
                <label for="employeeSearch">🔍 Поиск сотрудника (ФИО / табельный номер)</label>
                <input type="text" id="employeeSearch" placeholder="Начните вводить фамилию" autocomplete="off">
                <div id="employeeSuggestions" style="display:none;"></div>
                <input type="hidden" id="selectedEmployeeId">
            </div>

            <!-- ФИО (заполняется автоматически при выборе сотрудника) -->
            <div class="form-group">
                <label for="fio">ФИО полностью *</label>
                <input type="text" id="fio" placeholder="Иванов Иван Иванович" required>
            </div>

            <!-- КИЦ (город) – выпадающий список -->
            <div class="form-group">
                <label for="kic">КИЦ (город) *</label>
                <select id="kic" required>
                    <option value="">Загрузка списка...</option>
                </select>
                <div class="hint">Выберите ваш КИЦ</div>
            </div>

            <!-- Цель визита -->
            <div class="form-group">
                <label for="purpose">Цель визита *</label>
                <select id="purpose" required>
                    <option value="">Выберите программу</option>
                    <option value="Модуль 1">Модуль 1</option>
                    <option value="Модуль 2">Модуль 2</option>
                    <option value="ЕПП">Ежегодная периодическая проверка (ЕПП)</option>
                    <option value="Контраварийная подготовка">Контраварийная подготовка</option>
                </select>
            </div>

            <button type="submit" id="submitBtn" class="btn" disabled>
                <span class="btn-text" id="btnText">Подготовка...</span>
            </button>
        </form>
        <div id="status" class="status"></div>
    </div>
    <div class="footer">
        © 2026 Учебный центр. Все права защищены.
    </div>
</div>

<script>
    let locationData = { lat: null, lng: null };
    let isLocationReady = false;
    let isKICLoaded = false;
    let locationError = false;
    let citiesMap = {}; // { cityName: cityId }
    let citiesList = []; // для select

    // Геолокация
    function initGeolocation() {
        if (!navigator.geolocation) {
            locationError = true;
            checkFormReady();
            return;
        }
        navigator.geolocation.getCurrentPosition(
            (position) => {
                locationData = {
                    lat: position.coords.latitude,
                    lng: position.coords.longitude
                };
                isLocationReady = true;
                checkFormReady();
            },
            (error) => {
                console.warn('Geo error:', error);
                locationError = true;
                checkFormReady();
            },
            { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
        );
    }

    // Загрузка списка КИЦ (городов) для данного ГОСБ
    async function loadKICList() {
        try {
            const resp = await fetch(`/api/cities-by-gosb?gosb_name=${encodeURIComponent('{{ gosb.name }}')}`);
            const cities = await resp.json();
            const select = document.getElementById('kic');
            select.innerHTML = '<option value="">Выберите город</option>';
            citiesMap = {};
            citiesList = cities;
            cities.forEach(city => {
                const opt = document.createElement('option');
                opt.value = city.id;
                opt.textContent = city.name;
                select.appendChild(opt);
                citiesMap[city.name.toLowerCase()] = city.id;
            });
            isKICLoaded = true;
            checkFormReady();
        } catch (err) {
            console.error('KIC load error', err);
            const select = document.getElementById('kic');
            select.innerHTML = '<option value="">Ошибка загрузки, используйте резервный список</option>';
            const fallback = ['Екатеринбург', 'Нижний Тагил', 'Асбест', 'Первоуральск', 'Каменск-Уральский', 'Ирбит', 'Серов', 'Камышлов'];
            fallback.forEach(city => {
                const opt = document.createElement('option');
                opt.value = city;
                opt.textContent = city;
                select.appendChild(opt);
                citiesMap[city.toLowerCase()] = city;
            });
            isKICLoaded = true;
            checkFormReady();
        }
    }

    // Поиск сотрудников (автодополнение)
    const searchInput = document.getElementById('employeeSearch');
    const suggestionsDiv = document.getElementById('employeeSuggestions');
    const fioInput = document.getElementById('fio');
    const kicSelect = document.getElementById('kic');
    const employeeIdInput = document.getElementById('selectedEmployeeId');

    searchInput.addEventListener('input', async function() {
        const q = this.value.trim();
        if (q.length < 2) {
            suggestionsDiv.style.display = 'none';
            return;
        }
        try {
            const response = await fetch(`/api/employees/search?q=${encodeURIComponent(q)}&limit=10`);
            const employees = await response.json();
            if (employees.length === 0) {
                suggestionsDiv.style.display = 'none';
                return;
            }
            suggestionsDiv.innerHTML = '';
            employees.forEach(emp => {
                // Извлекаем название города из kic_pi (последнее слово)
                let cityName = '';
                if (emp.kic_pi) {
                    const parts = emp.kic_pi.trim().split(/\s+/);
                    cityName = parts[parts.length - 1];
                }
                const div = document.createElement('div');
                div.textContent = `${emp.fio} (таб. ${emp.tab_number || 'нет'}) — ${cityName}`;
                div.addEventListener('click', () => {
                    // Заполняем ФИО
                    fioInput.value = emp.fio;
                    employeeIdInput.value = emp.id;
                    // Ищем cityId по названию города
                    if (cityName) {
                        const lowerCity = cityName.toLowerCase();
                        const option = Array.from(kicSelect.options).find(opt => opt.text.toLowerCase() === lowerCity);
                        if (option) {
                            kicSelect.value = option.value;
                        } else {
                            // Если нет в списке, пытаемся добавить? Но лучше предупредить
                            console.warn('Город не найден в списке:', cityName);
                        }
                    }
                    searchInput.value = emp.fio;
                    suggestionsDiv.style.display = 'none';
                });
                suggestionsDiv.appendChild(div);
            });
            suggestionsDiv.style.display = 'block';
        } catch (err) {
            console.error('Ошибка поиска сотрудников', err);
        }
    });

    document.addEventListener('click', function(e) {
        if (e.target !== searchInput) {
            suggestionsDiv.style.display = 'none';
        }
    });

    function checkFormReady() {
        const btn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        if (isLocationReady && isKICLoaded) {
            btn.disabled = false;
            btnText.innerHTML = '✅ Зарегистрироваться';
        } else if (locationError && isKICLoaded) {
            btn.disabled = false;
            btnText.innerHTML = '⚠️ Зарегистрироваться (без точного адреса)';
        } else {
            btn.disabled = true;
            if (!isKICLoaded) btnText.innerHTML = '<span class="spinner"></span> Загрузка городов...';
            else if (!isLocationReady && !locationError) btnText.innerHTML = '<span class="spinner"></span> Подготовка...';
        }
    }

    // Валидация ФИО (минимум два слова)
    function validateFIO(fio) {
        const parts = fio.trim().split(/\s+/);
        return parts.length >= 2 && parts.every(p => p.length > 1);
    }

    function showStatus(message, type) {
        const statusDiv = document.getElementById('status');
        statusDiv.innerHTML = message;
        statusDiv.className = `status ${type}`;
        statusDiv.style.display = 'block';
        setTimeout(() => {
            if (statusDiv.style.display === 'block') statusDiv.style.display = 'none';
        }, 5000);
    }

    // Отправка формы
    document.getElementById('regForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const fio = fioInput.value.trim();
        const cityId = kicSelect.value;
        const purpose = document.getElementById('purpose').value;
        const employeeId = employeeIdInput.value;

        if (!validateFIO(fio)) {
            showStatus('❌ Укажите полные фамилию и имя (минимум два слова)', 'warning');
            fioInput.focus();
            return;
        }
        if (!cityId) {
            showStatus('❌ Выберите КИЦ (город)', 'warning');
            kicSelect.focus();
            return;
        }
        if (!purpose) {
            showStatus('❌ Выберите цель визита', 'warning');
            return;
        }

        const btn = document.getElementById('submitBtn');
        const btnTextSpan = document.getElementById('btnText');
        btn.disabled = true;
        btnTextSpan.innerHTML = '<span class="spinner"></span> Отправка...';

        const payload = {
            fio: fio,
            city_id: parseInt(cityId),
            purpose: purpose,
            latitude: locationData.lat,
            longitude: locationData.lng,
            gosb_slug: '{{ gosb.slug }}',
            employee_id: employeeId ? parseInt(employeeId) : null
        };

        try {
            const resp = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const result = await resp.json();
            if (result.status === 'success') {
                showStatus(`✅ Регистрация успешна!<br><small>${result.timestamp}</small><br>${result.address}`, 'success');
                document.getElementById('regForm').reset();
                kicSelect.selectedIndex = 0;
                document.getElementById('purpose').selectedIndex = 0;
                employeeIdInput.value = '';
                setTimeout(() => {
                    btn.disabled = false;
                    btnTextSpan.innerHTML = '✅ Зарегистрироваться';
                }, 2000);
            } else {
                showStatus(`❌ Ошибка: ${result.message || 'неизвестная ошибка'}`, 'error');
                btn.disabled = false;
                btnTextSpan.innerHTML = '✅ Попробовать снова';
            }
        } catch (err) {
            console.error(err);
            showStatus(`❌ Ошибка соединения: ${err.toString().slice(0, 150)}`, 'error');
            btn.disabled = false;
            btnTextSpan.innerHTML = '✅ Повторить регистрацию';
        }
    });

    // Инициализация
    window.onload = () => {
        initGeolocation();
        loadKICList();
    };
</script>
</body>
</html>
