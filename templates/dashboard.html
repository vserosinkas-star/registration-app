<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>AI Сводная панель обучения (сетка)</title>
    
    <!-- DataTables -->
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.13.4/css/jquery.dataTables.min.css">
    <!-- flatpickr (всплывающий календарь) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
    <!-- Шрифты -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/ru.js"></script>
    
    <style>
        /* ... все стили без изменений ... */
        /* (скопируйте из предыдущей версии, они не менялись) */
    </style>
</head>
<body>
    <div class="container">
        <h1>🧠 Сводная панель обучения (AI Edition)</h1>

        <!-- Панель фильтров -->
        <div class="filters-card">
            <div class="filters-grid">
                <div class="filter-item">
                    <label for="gosbSelect">ГОСБ</label>
                    <select id="gosbSelect"><option value="">Все ГОСБ</option></select>
                </div>
                <div class="filter-item">
                    <label for="kicSelect">КИЦ</label>
                    <select id="kicSelect" disabled><option value="">Все КИЦ</option></select>
                </div>
                <div class="filter-item">
                    <label for="fioFilter">Ф.И.О.</label>
                    <input type="text" id="fioFilter" placeholder="Введите имя...">
                </div>
                <div class="filter-item">
                    <label for="datePicker">📅 Дата</label>
                    <input type="text" id="datePicker" class="flatpickr-input" placeholder="Выберите дату">
                </div>
                <div class="filter-item">
                    <label for="yearFilter">Год</label>
                    <select id="yearFilter"><option value="">Все годы</option></select>
                </div>
                <div class="filter-item">
                    <label for="quarterFilter">Квартал</label>
                    <select id="quarterFilter">
                        <option value="">Все кварталы</option>
                        <option value="1">1 Квартал</option>
                        <option value="2">2 Квартал</option>
                        <option value="3">3 Квартал</option>
                        <option value="4">4 Квартал</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label for="monthFilter">Месяц</label>
                    <select id="monthFilter">
                        <option value="">Все месяцы</option>
                        <option value="1">Январь</option><option value="2">Февраль</option><option value="3">Март</option>
                        <option value="4">Апрель</option><option value="5">Май</option><option value="6">Июнь</option>
                        <option value="7">Июль</option><option value="8">Август</option><option value="9">Сентябрь</option>
                        <option value="10">Октябрь</option><option value="11">Ноябрь</option><option value="12">Декабрь</option>
                    </select>
                </div>
                <div class="filter-buttons">
                    <button class="btn" id="applyFilters">🔍 Применить</button>
                    <button class="btn btn-outline" id="resetFilters">↺ Сбросить</button>
                </div>
            </div>
        </div>

        <!-- Карточка таблицы -->
        <div class="table-card">
            <table id="dataTable" class="display" style="width:100%">
                <thead>
                    <tr>
                        <th>Дата и время</th><th>Табельный №</th><th>Ф.И.О.</th><th>Подразделение</th>
                        <th>Огневая ОЭТ, VR-тренажер/ (УТС автомат)</th><th>Блочное обучение</th>
                        <th>Радиосвязь и мониторинг</th><th>Учения по мониторингу и взаимодействию с СЦ ЦМИ</th>
                        <th>Контраварийная подготовка</th><th>Модуль 1</th><th>ЕПП</th>
                    </tr>
                </thead>
                <tbody></tbody>
                <tfoot>
                    <tr>
                        <th><input type="text" placeholder="Дата/время" /></th><th><input type="text" placeholder="Таб.№" /></th>
                        <th><input type="text" placeholder="Ф.И.О." /></th><th><input type="text" placeholder="Подразделение" /></th>
                        <th><input type="text" placeholder="ОЭТ/VR" /></th><th><input type="text" placeholder="Блочное" /></th>
                        <th><input type="text" placeholder="Радиосвязь" /></th><th><input type="text" placeholder="Учения" /></th>
                        <th><input type="text" placeholder="Контравар." /></th><th><input type="text" placeholder="Модуль 1" /></th>
                        <th><input type="text" placeholder="ЕПП" /></th>
                    </tr>
                </tfoot>
            </table>
        </div>
    </div>

    <script>
    let table;
    let datePicker;
    let allGosb = [];

    async function loadGosbList() {
        const response = await fetch('/api/gosb-list');
        const data = await response.json();
        allGosb = data;
        const select = document.getElementById('gosbSelect');
        data.forEach(g => {
            const option = document.createElement('option');
            option.value = g.name;
            option.textContent = g.name;
            select.appendChild(option);
        });
    }

    document.getElementById('gosbSelect').addEventListener('change', async function() {
        const gosbName = this.value;
        const kicSelect = document.getElementById('kicSelect');
        if (!gosbName) {
            kicSelect.innerHTML = '<option value="">Все КИЦ</option>';
            kicSelect.disabled = true;
            return;
        }
        const resp = await fetch(`/api/cities-by-gosb?gosb_name=${encodeURIComponent(gosbName)}`);
        const cities = await resp.json();
        kicSelect.innerHTML = '<option value="">Все КИЦ</option>';
        cities.forEach(city => {
            const opt = document.createElement('option');
            opt.value = city;
            opt.textContent = city;
            kicSelect.appendChild(opt);
        });
        kicSelect.disabled = false;
    });

    function initDatePicker() {
        datePicker = flatpickr("#datePicker", {
            locale: "ru",
            dateFormat: "d.m.Y",
            disableMobile: false,
            allowInput: true
        });
    }

    function formatDateForApi(dateStr) {
        if (!dateStr) return null;
        const parts = dateStr.split('.');
        if (parts.length !== 3) return null;
        return `${parts[2]}-${parts[1]}-${parts[0]}`;
    }

    async function loadTableData() {
        const gosb = document.getElementById('gosbSelect').value;
        const city = document.getElementById('kicSelect').value;
        const fio = document.getElementById('fioFilter').value;
        const year = document.getElementById('yearFilter').value;
        const quarter = document.getElementById('quarterFilter').value;
        const month = document.getElementById('monthFilter').value;
        const exactDate = formatDateForApi(document.getElementById('datePicker').value);

        let url = '/api/report-data?';
        const params = new URLSearchParams();
        if (gosb) params.append('gosb', gosb);
        if (city) params.append('city', city);
        if (fio) params.append('fio', fio);
        if (year) params.append('year', year);
        if (quarter) params.append('quarter', quarter);
        if (month) params.append('month', month);
        if (exactDate) params.append('exact_date', exactDate);
        url += params.toString();

        const resp = await fetch(url);
        const data = await resp.json();

        const tableData = data.map(row => {
            let formattedDate = '';
            if (row.timestamp) {
                const date = new Date(row.timestamp);
                // Прибавляем 5 часов для часового пояса Екатеринбурга (UTC+5)
                date.setHours(date.getHours() + 5);
                const day = String(date.getDate()).padStart(2, '0');
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const year = date.getFullYear();
                const hours = String(date.getHours()).padStart(2, '0');
                const minutes = String(date.getMinutes()).padStart(2, '0');
                const seconds = String(date.getSeconds()).padStart(2, '0');
                formattedDate = `${day}.${month}.${year} ${hours}:${minutes}:${seconds}`;
            }
            return [
                formattedDate,
                row.tab_number || '',
                row.fio,
                row.subdivision || '',
                row.fire_training || '',
                row.block_training || '',
                row.radio_comm || '',
                row.drills || '',
                row.emergency || '',
                row.module1 || '',
                row.epp || ''
            ];
        });

        if (table) {
            table.clear();
            table.rows.add(tableData);
            table.draw();
        } else {
            table = $('#dataTable').DataTable({
                data: tableData,
                columns: [
                    { title: "Дата и время" }, { title: "Табельный №" }, { title: "Ф.И.О." }, { title: "Подразделение" },
                    { title: "Огневая ОЭТ, VR-тренажер/ (УТС автомат)" }, { title: "Блочное обучение" },
                    { title: "Радиосвязь и мониторинг" }, { title: "Учения по мониторингу и взаимодействию с СЦ ЦМИ" },
                    { title: "Контраварийная подготовка" }, { title: "Модуль 1" }, { title: "ЕПП" }
                ],
                order: [[0, 'desc']],
                language: {
                    search: "Глобальный поиск:",
                    lengthMenu: "Показать _MENU_ записей",
                    info: "Записи с _START_ по _END_ из _TOTAL_",
                    paginate: { first: "Первая", last: "Последняя", next: "→", previous: "←" }
                },
                initComplete: function () {
                    this.api().columns().every(function () {
                        let column = this;
                        let input = $(column.footer()).find('input');
                        input.on('keyup change', function () {
                            column.search(this.value).draw();
                        });
                    });
                }
            });
            $('.dataTables_filter').hide();
            const lengthDiv = $('.dataTables_length');
            if (lengthDiv.length && $('#recordsCounter').length === 0) {
                lengthDiv.after('<span id="recordsCounter" class="records-counter">Всего: <span class="total-count">0</span> чел.</span>');
            }
        }

        const filteredCount = table.rows({ search: 'applied' }).count();
        $('#recordsCounter .total-count').text(filteredCount);
    }

    function resetFilters() {
        document.getElementById('gosbSelect').value = '';
        document.getElementById('kicSelect').innerHTML = '<option value="">Все КИЦ</option>';
        document.getElementById('kicSelect').disabled = true;
        document.getElementById('fioFilter').value = '';
        document.getElementById('yearFilter').value = '';
        document.getElementById('quarterFilter').value = '';
        document.getElementById('monthFilter').value = '';
        if (datePicker) datePicker.clear();
        loadTableData();
    }

    window.onload = async () => {
        initDatePicker();
        await loadGosbList();
        await loadTableData();
        document.getElementById('applyFilters').addEventListener('click', loadTableData);
        document.getElementById('resetFilters').addEventListener('click', resetFilters);
    };
    </script>
</body>
</html>
